<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Custom Alert</title>

<style>
.notify {
  position: fixed;
  top: 20px;
  right: 20px;
  min-width: 250px;
  padding: 15px;
  color: #fff;
  border-radius: 5px;
  animation: fade 3s forwards;
  z-index: 9999;
}
.success { background: #198754; }
.error { background: #dc3545; }

@keyframes fade {
  0% {opacity:1}
  80% {opacity:1}
  100% {opacity:0}
}
</style>
</head>
<body class="p-5">

<button class="btn btn-success" onclick="notify('Saved successfully','success')">Success</button>
<button class="btn btn-danger" onclick="notify('Something went wrong','error')">Error</button>

<script>
function notify(msg,type){
  const d=document.createElement("div")
  d.className=`notify ${type}`
  d.innerText=msg
  document.body.appendChild(d)
  setTimeout(()=>d.remove(),3000)
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Students</title>
</head>
<body>

<div class="container mt-4">
  <h3>Student List</h3>

  <!-- Search -->
  <form method="get" class="mb-3">
    <input type="text" name="q" value="{{ q }}" class="form-control"
           placeholder="Search by name">
  </form>

  <!-- Table -->
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead class="table-dark">
        <tr>
          <th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Action</th>
        </tr>
      </thead>
      <tbody>
        {% for s in students %}
        <tr>
          <td>{{ s.id }}</td>
          <td>{{ s.name }}</td>
          <td>{{ s.email }}</td>
          <td>{{ s.course }}</td>
          <td>
            <a href="/edit/{{ s.id }}" class="btn btn-warning btn-sm">Edit</a>
            <button class="btn btn-danger btn-sm"
                    data-bs-toggle="modal"
                    data-bs-target="#m{{ s.id }}">Delete</button>
          </td>
        </tr>

        <!-- Delete Modal -->
        <div class="modal fade" id="m{{ s.id }}">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Confirm Delete</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                Delete {{ s.name }}?
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <a href="/delete/{{ s.id }}" class="btn btn-danger">Delete</a>
              </div>
            </div>
          </div>
        </div>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <!-- Pagination -->
  <nav>
    <ul class="pagination">
      {% for p in range(1, pages+1) %}
      <li class="page-item {% if p==page %}active{% endif %}">
        <a class="page-link" href="?page={{ p }}&q={{ q }}">{{ p }}</a>
      </li>
      {% endfor %}
    </ul>
  </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

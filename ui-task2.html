<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Login</title>
</head>
<body>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <form class="needs-validation" novalidate>
        <h3 class="text-center mb-4">Login</h3>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" required>
          <div class="invalid-feedback">Enter valid email</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" minlength="6" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">Show</button>
            <div class="invalid-feedback">Minimum 6 characters</div>
          </div>
        </div>

        <button class="btn btn-primary w-100">Login</button>
      </form>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
function togglePassword() {
  const pwd = document.getElementById("password")
  pwd.type = pwd.type === "password" ? "text" : "password"
}

(() => {
  const form = document.querySelector('.needs-validation')
  form.addEventListener('submit', e => {
    if (!form.checkValidity()) {
      e.preventDefault()
      e.stopPropagation()
    }
    form.classList.add('was-validated')
  })
})()
</script>

</body>
</html>

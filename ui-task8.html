<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Sortable Table</title>
</head>
<body>

<div class="container mt-5">
  <h3 class="mb-3">Student List</h3>

  <div class="table-responsive">
    <table class="table table-bordered" id="myTable">
      <thead class="table-dark">
        <tr>
          <th onclick="sortTable(0)">Name ⬍</th>
          <th onclick="sortTable(1)">Email ⬍</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>Asha</td><td>asha@mail.com</td></tr>
        <tr><td>Rahul</td><td>rahul@mail.com</td></tr>
        <tr><td>Neha</td><td>neha@mail.com</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let asc = true
function sortTable(col) {
  const table = document.getElementById("myTable")
  const rows = Array.from(table.rows).slice(1)
  asc = !asc

  rows.sort((a,b)=>{
    let x = a.cells[col].innerText.toLowerCase()
    let y = b.cells[col].innerText.toLowerCase()
    return asc ? x.localeCompare(y) : y.localeCompare(x)
  })

  rows.forEach(r=>table.tBodies[0].appendChild(r))
}
</script>

</body>
</html>

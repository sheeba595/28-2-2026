<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<title>Multi Step Form</title>
</head>
<body>

<div class="container mt-5">
  <div class="col-md-6 mx-auto">

    <!-- Progress Bar -->
    <div class="progress mb-4">
      <div class="progress-bar" id="progressBar" style="width:33%"></div>
    </div>

    <!-- Step 1 -->
    <div class="step">
      <input class="form-control mb-3" placeholder="Name">
      <button class="btn btn-primary" onclick="nextStep()">Next</button>
    </div>

    <!-- Step 2 -->
    <div class="step d-none">
      <input class="form-control mb-3" placeholder="Email">
      <button class="btn btn-secondary" onclick="prevStep()">Back</button>
      <button class="btn btn-primary" onclick="nextStep()">Next</button>
    </div>

    <!-- Step 3 -->
    <div class="step d-none">
      <input class="form-control mb-3" placeholder="Password">
      <button class="btn btn-secondary" onclick="prevStep()">Back</button>
      <button class="btn btn-success">Submit</button>
    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let step = 0
const steps = document.querySelectorAll('.step')
const bar = document.getElementById('progressBar')

function showStep() {
  steps.forEach((s,i)=>s.classList.toggle('d-none', i!==step))
  bar.style.width = ((step+1)/steps.length)*100 + '%'
}

function nextStep() {
  if(step < steps.length-1){ step++; showStep() }
}

function prevStep() {
  if(step > 0){ step--; showStep() }
}
</script>

</body>
</html>

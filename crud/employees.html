<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3>Employees</h3>

<form class="row g-2 mb-3">
  <input name="q" class="form-control col" placeholder="Search name">
  <select name="dept" class="form-control col">
    <option value="">Department</option>
    <option>IT</option><option>HR</option>
  </select>
  <select name="sort" class="form-control col">
    <option value="">Sort Salary</option>
    <option value="ASC">Low → High</option>
    <option value="DESC">High → Low</option>
  </select>
  <button class="btn btn-primary col">Apply</button>
</form>

<p>Total Employees: <b>{{ total }}</b></p>
<p>Highest Salary: <b>{{ highest.name }} ({{ highest.salary }})</b></p>

<table class="table table-bordered">
<tr><th>Name</th><th>Dept</th><th>Salary</th></tr>
{% for e in employees %}
<tr>
<td>{{e.name}}</td>
<td>{{e.department}}</td>
<td>{{e.salary}}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
